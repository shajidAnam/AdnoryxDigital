<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Founder Photo Placeholder</title>
  <desc id="desc">Photo placeholder for Md Anamul Shajid</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#13283f"/>
      <stop offset="100%" stop-color="#0a1525"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <circle cx="400" cy="300" r="130" fill="rgba(255,255,255,0.12)"/>
  <path d="M180 700c30-120 110-190 220-190s190 70 220 190" fill="rgba(255,255,255,0.12)"/>
  <rect x="140" y="90" width="520" height="620" rx="24" fill="none" stroke="url(#accent)" stroke-width="8" opacity="0.75"/>
  <text x="400" y="740" text-anchor="middle" fill="#d9ecff" font-family="Arial, sans-serif" font-size="34" font-weight="700">Md Anamul Shajid</text>
  <text x="400" y="775" text-anchor="middle" fill="#9db5d6" font-family="Arial, sans-serif" font-size="22">Founder Photo Placeholder</text>
</svg>
